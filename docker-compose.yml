services:

  db:
    image: mysql:8.0
    container_name: waste_mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  web:
    build: .
    container_name: waste_django
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./media:/app/media
      - ./models:/app/models
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "python manage.py migrate && gunicorn waste_classification.wsgi:application --bind 0.0.0.0:8000 --workers 2"

volumes:
  mysql_data: